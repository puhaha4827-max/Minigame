<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>솜이의 꿈나라 달리기 🐰</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:radial-gradient(ellipse at center,#1a0533 0%,#090112 100%);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;font-family:'Jua',sans-serif;
}
#wrap{
  position:relative;width:420px;height:620px;
  border-radius:28px;overflow:hidden;
  box-shadow:0 0 0 2px rgba(220,180,255,.4),0 0 80px rgba(160,80,255,.5),0 0 160px rgba(80,30,180,.3);
}
canvas{display:block;width:100%;height:100%;}
#hud{
  position:absolute;top:14px;left:0;right:0;
  display:flex;justify-content:space-between;padding:0 16px;
  pointer-events:none;
}
.pill{
  background:rgba(255,255,255,.22);backdrop-filter:blur(10px);
  border:1.5px solid rgba(255,255,255,.45);border-radius:50px;
  padding:6px 14px;font-size:15px;font-weight:700;color:#2a103e;
  display:flex;align-items:center;gap:5px;
}
.screen{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
#title-screen{background:linear-gradient(160deg,rgba(200,230,255,.9),rgba(230,195,255,.9));backdrop-filter:blur(6px);}
#over-screen{background:linear-gradient(160deg,rgba(30,10,60,.94),rgba(70,20,110,.94));backdrop-filter:blur(8px);display:none;}
.big-title{font-size:40px;color:#2a103e;text-align:center;line-height:1.2;text-shadow:2px 3px 0 rgba(180,140,255,.5);margin-bottom:2px;}
.sub{font-size:14px;color:#5a3a7e;letter-spacing:.5px;margin-bottom:4px;}
#hero-canvas{display:block;margin:0 auto;}
.char-shadow{width:68px;height:12px;background:rgba(100,70,180,.2);border-radius:50%;margin:0 auto 4px;animation:sp 2.2s ease-in-out infinite;}
@keyframes sp{0%,100%{transform:scaleX(1);opacity:.4;}50%{transform:scaleX(.6);opacity:.15;}}
.btn{
  padding:14px 50px;border-radius:50px;border:none;
  font-family:'Jua',sans-serif;font-size:20px;cursor:pointer;
  letter-spacing:1px;transition:transform .12s;margin-top:14px;
}
.btn-start{background:linear-gradient(135deg,#7ec8f7,#c280fc);color:#fff;box-shadow:0 6px 24px rgba(100,60,255,.4);}
.btn-retry{background:linear-gradient(135deg,#ffadde,#c280fc);color:#fff;box-shadow:0 6px 24px rgba(200,60,255,.4);}
.btn:active{transform:scale(.96) translateY(2px);}
.tip{font-size:12px;color:#5a3a7e;text-align:center;margin-top:8px;line-height:1.8;opacity:.85;}
.go-label{font-size:24px;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(255,180,255,.8);letter-spacing:2px;margin-bottom:6px;}
.go-score{font-size:54px;font-weight:900;color:#ffe566;text-shadow:0 0 20px rgba(255,200,50,.7);line-height:1;}
.go-best{font-size:15px;color:rgba(255,255,255,.55);margin:6px 0 0;}
#combo{
  position:absolute;top:68px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#ff9de2,#c280fc);color:#fff;
  font-size:16px;font-weight:700;padding:5px 18px;border-radius:50px;
  white-space:nowrap;opacity:0;pointer-events:none;
  box-shadow:0 4px 18px rgba(200,60,255,.45);transition:opacity .3s;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="420" height="620"></canvas>
  <div id="hud" style="display:none">
    <div class="pill">⭐ <span id="s-score">0</span></div>
    <div class="pill">🏆 <span id="s-best">0</span></div>
    <div class="pill" id="s-lives-pill">❤️❤️❤️</div>
  </div>
  <div id="combo">✨ 콤보!</div>

  <div class="screen" id="title-screen">
    <div class="big-title">솜이의<br>꿈나라 달리기 🐰</div>
    <p class="sub">별을 모아 하늘을 달려요!</p>
    <canvas id="hero-canvas" width="140" height="140"></canvas>
    <div class="char-shadow"></div>
    <button class="btn btn-start" onclick="startGame()">게임 시작!</button>
    <p class="tip">탭 / 클릭 → 점프 &nbsp;|&nbsp; 두 번 연속 → 이단 점프<br>👻 유령·🦇 박쥐를 피하고 ⭐ 별을 모아요!</p>
  </div>

  <div class="screen" id="over-screen">
    <canvas id="over-canvas" width="120" height="120" style="margin-bottom:8px"></canvas>
    <div class="go-label">솜이가 잠들었어요… 🌙</div>
    <div class="go-score" id="go-score">0</div>
    <div class="go-best" id="go-best">최고: 0</div>
    <button class="btn btn-retry" onclick="startGame()">다시 달려요!</button>
  </div>
</div>

<script>
const C=document.getElementById('game'), ctx=C.getContext('2d');
const W=420, H=620, GROUND=H-90;

/* ─────────────────────────────────────────────
   솜이 (토끼) 캐릭터 — 100% 오리지널
   하얀 몸, 길고 홀쭉한 귀, 분홍 눈, 작은 코
───────────────────────────────────────────── */

const CINNA_W = 130;
const CINNA_H = 104;

function drawCinna(c2d, cx, cy, opts){
  const {scale=1, blink=false, hurt=false, jump=false}=opts||{};
  const OL='#e8a0b0', OW=2.2;

  c2d.save();
  c2d.translate(cx, cy);
  c2d.scale(scale, scale);
  if(hurt) c2d.globalAlpha=0.42;

  // 그림자
  c2d.fillStyle='rgba(80,50,120,.14)';
  c2d.beginPath(); c2d.ellipse(2,1,38,7,0,0,Math.PI*2); c2d.fill();

  // ── 꼬리 (몸 뒤 작고 동그랗게) ──
  c2d.fillStyle='#fff'; c2d.strokeStyle=OL; c2d.lineWidth=OW;
  c2d.beginPath(); c2d.arc(-22,-16,9,0,Math.PI*2); c2d.fill(); c2d.stroke();
  // 꼬리 털 느낌 (작은 원 여러개)
  ['#fff','#f8f0f5','#fff'].forEach((col,i)=>{
    c2d.fillStyle=col;
    c2d.beginPath(); c2d.arc(-22+i*3-3,-16+i*2-2,5,0,Math.PI*2); c2d.fill();
  });

  // ── 몸통 ──
  const bodyGrad = c2d.createRadialGradient(-2,-22,2,-2,-22,26);
  bodyGrad.addColorStop(0,'#ffffff');
  bodyGrad.addColorStop(1,'#fce8f0');
  c2d.fillStyle=bodyGrad; c2d.strokeStyle=OL; c2d.lineWidth=OW;
  c2d.beginPath(); c2d.ellipse(4,-22,22,22,0,0,Math.PI*2); c2d.fill(); c2d.stroke();

  // ── 뒷발 (통통하고 귀여운) ──
  const fy=jump?-6:-2;
  [[-12,fy],[18,fy]].forEach(([fx,fy2])=>{
    const fg=c2d.createRadialGradient(fx,fy2,1,fx,fy2,12);
    fg.addColorStop(0,'#fff'); fg.addColorStop(1,'#fce8f0');
    c2d.fillStyle=fg; c2d.strokeStyle=OL; c2d.lineWidth=OW;
    c2d.beginPath(); c2d.ellipse(fx,fy2,12,9,0,0,Math.PI*2); c2d.fill(); c2d.stroke();
  });

  // ── 앞발 (가슴 앞에 모음) ──
  const ax=jump?-9:-3, ax2=jump?9:9, ay=jump?-38:-28;
  c2d.fillStyle='#fff'; c2d.strokeStyle=OL; c2d.lineWidth=OW;
  c2d.beginPath(); c2d.ellipse(ax, ay+2, 10,8, jump?-0.5:0.3, 0,Math.PI*2); c2d.fill(); c2d.stroke();
  c2d.beginPath(); c2d.ellipse(ax2,ay,   10,8, jump? 0.5:-0.3,0,Math.PI*2); c2d.fill(); c2d.stroke();

  // ── 귀 (길고 홀쭉하게 위로 쭉) ──
  // 왼쪽 귀
  c2d.fillStyle='#fff'; c2d.strokeStyle=OL; c2d.lineWidth=OW;
  c2d.beginPath();
  c2d.moveTo(-10,-90);
  c2d.bezierCurveTo(-16,-120,-22,-128,-18,-134);
  c2d.bezierCurveTo(-14,-140,-6,-138,-4,-130);
  c2d.bezierCurveTo(-2,-118, 2,-104, 2,-90);
  c2d.closePath(); c2d.fill(); c2d.stroke();
  // 왼쪽 귀 안쪽 핑크
  c2d.fillStyle='rgba(255,160,190,.55)';
  c2d.beginPath();
  c2d.moveTo(-10,-94);
  c2d.bezierCurveTo(-13,-118,-17,-124,-14,-130);
  c2d.bezierCurveTo(-11,-136,-7,-134,-5,-126);
  c2d.bezierCurveTo(-3,-116,0,-104,0,-94);
  c2d.closePath(); c2d.fill();

  // 오른쪽 귀
  c2d.fillStyle='#fff'; c2d.strokeStyle=OL; c2d.lineWidth=OW;
  c2d.beginPath();
  c2d.moveTo(16,-90);
  c2d.bezierCurveTo(20,-118,26,-128,22,-134);
  c2d.bezierCurveTo(18,-140,10,-138,8,-130);
  c2d.bezierCurveTo(6,-118,4,-104,6,-90);
  c2d.closePath(); c2d.fill(); c2d.stroke();
  // 오른쪽 귀 안쪽 핑크
  c2d.fillStyle='rgba(255,160,190,.55)';
  c2d.beginPath();
  c2d.moveTo(14,-94);
  c2d.bezierCurveTo(17,-118,21,-124,18,-130);
  c2d.bezierCurveTo(15,-136,11,-134,9,-126);
  c2d.bezierCurveTo(7,-116,6,-104,8,-94);
  c2d.closePath(); c2d.fill();

  // ── 머리 (귀 위에 그려 뿌리 덮음) ──
  const headGrad=c2d.createRadialGradient(-6,-68,4,-2,-64,36);
  headGrad.addColorStop(0,'#ffffff');
  headGrad.addColorStop(1,'#fce8f0');
  c2d.fillStyle=headGrad; c2d.strokeStyle=OL; c2d.lineWidth=OW;
  c2d.beginPath(); c2d.arc(4,-68,34,0,Math.PI*2); c2d.fill(); c2d.stroke();
  // 머리 하이라이트
  c2d.fillStyle='rgba(255,255,255,.6)';
  c2d.beginPath(); c2d.ellipse(-10,-80,10,6,-0.5,0,Math.PI*2); c2d.fill();

  // ── 눈 (분홍빛 귀여운 눈) ──
  const eyeY=-70;
  if(blink){
    c2d.strokeStyle='#d06080'; c2d.lineWidth=2.5; c2d.lineCap='round';
    [-12,12].forEach(ex=>{
      c2d.beginPath();
      c2d.moveTo(ex-7,eyeY+2);
      c2d.quadraticCurveTo(ex,eyeY-5,ex+7,eyeY+2);
      c2d.stroke();
    });
  } else {
    [-12,12].forEach(ex=>{
      // 눈 흰자
      c2d.fillStyle='#fff';
      c2d.beginPath(); c2d.ellipse(ex,eyeY,8,9,0,0,Math.PI*2); c2d.fill();
      // 분홍 홍채
      c2d.fillStyle='#f080a8';
      c2d.beginPath(); c2d.ellipse(ex,eyeY+1,5.5,7,0,0,Math.PI*2); c2d.fill();
      // 동공
      c2d.fillStyle='#8b1a40';
      c2d.beginPath(); c2d.ellipse(ex+1,eyeY+1,3.5,4.5,0,0,Math.PI*2); c2d.fill();
      // 하이라이트
      c2d.fillStyle='rgba(255,255,255,.95)';
      c2d.beginPath(); c2d.ellipse(ex+2.5,eyeY-2,2.2,2.8,0.3,0,Math.PI*2); c2d.fill();
      c2d.beginPath(); c2d.arc(ex-1.5,eyeY+2,1.2,0,Math.PI*2); c2d.fill();
    });
  }

  // ── 코 (작은 하트 모양 핑크) ──
  c2d.fillStyle='#f090b0';
  c2d.beginPath();
  c2d.moveTo(0,-57);
  c2d.bezierCurveTo(0,-60,-5,-60,-5,-57);
  c2d.bezierCurveTo(-5,-54,-0.5,-52,0,-51);
  c2d.bezierCurveTo(0.5,-52,5,-54,5,-57);
  c2d.bezierCurveTo(5,-60,0,-60,0,-57);
  c2d.fill();

  // ── 입 (귀여운 W) ──
  c2d.strokeStyle='#d06888'; c2d.lineWidth=1.8; c2d.lineCap='round'; c2d.lineJoin='round';
  c2d.beginPath();
  c2d.moveTo(-5,-49); c2d.quadraticCurveTo(-2.5,-45,0,-47); c2d.quadraticCurveTo(2.5,-45,5,-49);
  c2d.stroke();

  // ── 볼 홍조 ──
  [-17,20].forEach(bx=>{
    c2d.fillStyle='rgba(255,140,175,.32)';
    c2d.beginPath(); c2d.ellipse(bx,-60,10,7,0,0,Math.PI*2); c2d.fill();
  });

  c2d.globalAlpha=1;
  c2d.restore();
}

function drawCinnaCanvas(cvs, opts){
  const c=cvs.getContext('2d');
  c.clearRect(0,0,cvs.width,cvs.height);
  c.imageSmoothingEnabled=true;
  c.imageSmoothingQuality='high';
  drawCinna(c, cvs.width/2, cvs.height+10, {scale: cvs.width/130*0.68, ...opts});
}

/* ─────────────────────────────────────────────
   GAME STATE
───────────────────────────────────────────── */
let state='title';
let score=0, best=parseInt(localStorage.getItem('cd_best')||'0'), lives=3;
let raf, lastT=0;

let px=80, py=GROUND, pvy=0, jumpsLeft=2;
let blinkTimer=3, blinkOn=false, hurtTimer=0, runFrame=0, runTimer=0;

let obs=[], collectStars=[], particles=[], bgClouds=[];
let speed=220, spawnT=0.9, starT=1.3;
let bgOffset=0;
let comboCount=0, comboTimer=0;
let autoScoreTick=0;

function resetBgClouds(){
  bgClouds=Array.from({length:8},(_,i)=>({
    x:i*120+Math.random()*60, y:60+Math.random()*200,
    w:70+Math.random()*80, h:28+Math.random()*18,
    sp:15+Math.random()*22, alpha:0.22+Math.random()*0.28
  }));
}

function initGame(){
  score=0; lives=3; speed=220;
  px=80; py=GROUND; pvy=0; jumpsLeft=2; hurtTimer=0; blinkTimer=3; runFrame=0; runTimer=0;
  obs=[]; collectStars=[]; particles=[];
  spawnT=0.9; starT=1.3; comboCount=0; comboTimer=0; bgOffset=0; autoScoreTick=0;
  resetBgClouds();
  document.getElementById('hud').style.display='flex';
  document.getElementById('combo').style.opacity='0';
  updateHUD();
}

function updateHUD(){
  document.getElementById('s-score').textContent=score;
  document.getElementById('s-best').textContent=Math.max(best,score);
  document.getElementById('s-lives-pill').textContent='❤️'.repeat(Math.max(0,lives));
}

/* ─────────────────────────────────────────────
   OBSTACLE DRAWING
───────────────────────────────────────────── */
function drawObstacle(o){
  ctx.save();
  ctx.translate(o.x+o.w/2, o.y+o.h);

  if(o.type==='ghost'){
    const bob=Math.sin(o.phase)*5;
    ctx.translate(0,bob);
    // glow
    ctx.shadowColor='rgba(200,150,255,.6)'; ctx.shadowBlur=22;
    // body
    ctx.fillStyle='rgba(215,185,255,.88)';
    ctx.beginPath();
    ctx.arc(0,-22,18,Math.PI,0);
    ctx.lineTo(18,0);
    // wavy bottom
    for(let i=0;i<4;i++){
      ctx.quadraticCurveTo(18-i*9-4, i%2===0?9:-5, 18-(i+1)*9,0);
    }
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
    // eyes
    ctx.fillStyle='#5a2888';
    [-7,7].forEach(ex=>{ ctx.beginPath(); ctx.ellipse(ex,-24,4,5,0,0,Math.PI*2); ctx.fill(); });
    // shine in eyes
    ctx.fillStyle='rgba(255,255,255,.6)';
    [-7,7].forEach(ex=>{ ctx.beginPath(); ctx.arc(ex+1.5,-26,1.8,0,Math.PI*2); ctx.fill(); });
    // cute mouth
    ctx.strokeStyle='rgba(90,40,136,.7)'; ctx.lineWidth=1.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-5,-17); ctx.quadraticCurveTo(0,-12,5,-17); ctx.stroke();

  } else if(o.type==='bat'){
    const fl=Math.sin(o.phase*3.5)*0.45;
    ctx.fillStyle='#7030a0';
    [-1,1].forEach(side=>{
      ctx.save(); ctx.scale(side,1);
      ctx.beginPath();
      ctx.moveTo(2,-12);
      ctx.bezierCurveTo(12,-14+fl*22,24,-6,22,4);
      ctx.bezierCurveTo(16,0,10,2,2,0);
      ctx.fill();
      // wing membrane detail
      ctx.strokeStyle='rgba(120,60,160,.4)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(2,-8); ctx.lineTo(18,-2); ctx.stroke();
      ctx.restore();
    });
    // body
    const bg2=ctx.createRadialGradient(0,-14,2,0,-14,10);
    bg2.addColorStop(0,'#8040b0'); bg2.addColorStop(1,'#501878');
    ctx.fillStyle=bg2;
    ctx.beginPath(); ctx.ellipse(0,-13,9,11,0,0,Math.PI*2); ctx.fill();
    // eyes
    ctx.fillStyle='#ffbbdd';
    [-4,4].forEach(ex=>{ ctx.beginPath(); ctx.arc(ex,-16,2.8,0,Math.PI*2); ctx.fill(); });
    ctx.fillStyle='#aa0044';
    [-4,4].forEach(ex=>{ ctx.beginPath(); ctx.arc(ex,-16,1.4,0,Math.PI*2); ctx.fill(); });
    // ears
    ctx.fillStyle='#601890';
    [[-7,-22],[7,-22]].forEach(([ex,ey])=>{
      ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(ex-4,ey-10); ctx.lineTo(ex+4,ey-10); ctx.closePath(); ctx.fill();
    });

  } else { // rock / crystal
    ctx.shadowColor='rgba(160,120,220,.4)'; ctx.shadowBlur=12;
    // base
    ctx.fillStyle='#c8b0e8';
    ctx.beginPath(); ctx.ellipse(0,0,16,7,0,0,Math.PI*2); ctx.fill();
    // crystal shards
    [[0,-28,7,14],[-9,-20,5,11],[9,-20,5,11]].forEach(([cx2,cy2,rw,rh])=>{
      ctx.fillStyle='#d8c4f4';
      ctx.beginPath();
      ctx.moveTo(cx2,cy2-rh); ctx.lineTo(cx2-rw,cy2+rh); ctx.lineTo(cx2+rw,cy2+rh);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1;
      ctx.stroke();
    });
    ctx.shadowBlur=0;
  }
  ctx.restore();
}

/* ─────────────────────────────────────────────
   STAR COLLECTIBLE
───────────────────────────────────────────── */
function drawCollectStar(s){
  ctx.save();
  ctx.translate(s.x,s.y);
  ctx.rotate(s.angle);
  ctx.shadowColor='#ffe566'; ctx.shadowBlur=16;
  ctx.fillStyle='#ffe033';
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const r=i%2===0?s.r:s.r*.42;
    const a=(Math.PI*2*i/10)-Math.PI/2;
    i===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
  // inner highlight
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,200,.7)';
  ctx.beginPath(); ctx.arc(0,0,s.r*.25,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

/* ─────────────────────────────────────────────
   BACKGROUND
───────────────────────────────────────────── */
function drawBg(){
  const t=Math.min(score/1000,1);
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,`hsl(${215+t*50},${62+t*20}%,${75-t*22}%)`);
  grad.addColorStop(.55,`hsl(${265+t*30},${52+t*18}%,${82-t*18}%)`);
  grad.addColorStop(1,`hsl(${295+t*20},38%,${88-t*12}%)`);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // distant stars at night
  if(t>0.4){
    ctx.fillStyle=`rgba(255,240,200,${(t-0.4)*1.2})`;
    for(let i=0;i<25;i++){
      const sx=((i*173+bgOffset*.04)%W+W)%W;
      const sy=15+((i*113)%200);
      ctx.beginPath(); ctx.arc(sx,sy,1.2,0,Math.PI*2); ctx.fill();
    }
  }

  // bg clouds
  bgClouds.forEach(c=>{
    c.x-=c.sp/60;
    if(c.x+c.w<0){c.x=W+20;c.y=60+Math.random()*200;}
    drawBgCloud(c.x,c.y,c.w,c.h,c.alpha);
  });

  // ground
  const gg=ctx.createLinearGradient(0,GROUND+8,0,H);
  gg.addColorStop(0,'#d0b8f0'); gg.addColorStop(1,'#b090d8');
  ctx.fillStyle=gg; ctx.fillRect(0,GROUND+8,W,H-GROUND-8);
  ctx.fillStyle='rgba(255,255,255,.32)'; ctx.fillRect(0,GROUND+6,W,5);

  // parallax dots on ground
  ctx.fillStyle='rgba(255,255,255,.18)';
  for(let i=0;i<14;i++){
    const dx=((i*76-bgOffset*.35)%W+W)%W;
    ctx.beginPath(); ctx.arc(dx,GROUND+22,3.5,0,Math.PI*2); ctx.fill();
  }
}

function drawBgCloud(x,y,w,h,a){
  ctx.save(); ctx.globalAlpha=a;
  ctx.fillStyle='#fff';
  const n=Math.ceil(w/28);
  for(let i=0;i<n;i++){
    ctx.beginPath(); ctx.arc(x+i*(w/n)+12,y,h/2+Math.sin(i*1.3)*5,0,Math.PI*2); ctx.fill();
  }
  ctx.beginPath(); ctx.roundRect(x,y,w,h*.5,5); ctx.fill();
  ctx.restore();
}

/* ─────────────────────────────────────────────
   PARTICLES
───────────────────────────────────────────── */
function spawnParticles(x,y,color,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,
      life:.7+Math.random()*.6,maxLife:1.3,r:2+Math.random()*3.5,color});
  }
}

/* ─────────────────────────────────────────────
   UPDATE
───────────────────────────────────────────── */
function update(dt){
  bgOffset+=speed*dt;
  speed=Math.min(520,220+score*.2);

  // gravity
  if(py<GROUND) pvy+=1300*dt;
  py+=pvy*dt;
  if(py>=GROUND){ py=GROUND; pvy=0; jumpsLeft=2; }

  // blink
  blinkTimer-=dt;
  if(blinkTimer<0){ blinkTimer=2.5+Math.random()*2.5; blinkOn=true; setTimeout(()=>blinkOn=false,110); }

  // hurt
  if(hurtTimer>0) hurtTimer-=dt;

  // run frame
  runTimer+=dt;
  if(runTimer>.13){ runTimer=0; runFrame=(runFrame+1)%4; }

  // combo
  if(comboTimer>0){ comboTimer-=dt; if(comboTimer<=0){ comboCount=0; document.getElementById('combo').style.opacity='0'; } }

  // spawn obstacles
  spawnT-=dt;
  if(spawnT<=0){
    const types=['ghost','bat','crystal'];
    const type=types[Math.floor(Math.random()*types.length)];
    const oh=type==='bat'?28:type==='ghost'?52:30;
    const yOff=type==='bat'?-65:0;
    obs.push({x:W+20,y:GROUND-oh+yOff,w:38,h:oh,type,phase:Math.random()*Math.PI*2});
    spawnT=1.0-Math.min(.65,score/600)+Math.random()*.55;
  }

  // spawn stars
  starT-=dt;
  if(starT<=0){
    const sy=GROUND-(35+Math.random()*160);
    collectStars.push({x:W+10,y:sy,r:11+Math.random()*5,angle:0});
    starT=1.0+Math.random()*.9;
  }

  // move obs
  obs.forEach(o=>{ o.x-=speed*dt; o.phase+=dt*2.2; });
  obs=obs.filter(o=>o.x+o.w>-30);

  // move stars
  collectStars.forEach(s=>{ s.x-=speed*.9*dt; s.angle+=dt*2.5; });
  collectStars=collectStars.filter(s=>s.x>-30);

  // collect stars
  collectStars.forEach(s=>{
    if(s.collected) return;
    if(Math.abs(px+20-s.x)<30 && Math.abs(py-s.y)<30){
      s.collected=true;
      const pts=comboCount>=2?3+comboCount:1;
      score+=pts; comboCount++; comboTimer=2.0;
      showCombo(comboCount>=3?`${comboCount}콤보! +${pts}`:'+1 ⭐');
      spawnParticles(s.x,s.y,'#ffe566',12);
      updateHUD();
    }
  });
  collectStars=collectStars.filter(s=>!s.collected);

  // collide obstacles
  if(hurtTimer<=0){
    for(const o of obs){
      const hit = px+20<o.x+o.w-4 && px+50>o.x+4 && py-100<o.y+o.h-4 && py>o.y+4;
      if(hit){
        hurtTimer=1.6; lives--;
        comboCount=0;
        document.getElementById('combo').style.opacity='0';
        spawnParticles(px+20,py-18,'#ff88aa',18);
        updateHUD();
        if(lives<=0){ setTimeout(gameOver,400); return; }
        break;
      }
    }
  }

  // auto score
  autoScoreTick+=dt;
  if(autoScoreTick>=.15){ autoScoreTick=0; score++; updateHUD(); }

  // particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.14;p.life-=dt;p.alpha=p.life/p.maxLife;});
  particles=particles.filter(p=>p.life>0);
}

/* ─────────────────────────────────────────────
   RENDER
───────────────────────────────────────────── */
function render(){
  ctx.clearRect(0,0,W,H);
  drawBg();
  obs.forEach(o=>drawObstacle(o));
  collectStars.forEach(s=>drawCollectStar(s));
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,p.alpha);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  const bob=py===GROUND?Math.sin(runFrame*Math.PI/2)*2.5:0;
  drawCinna(ctx, px+20, py+bob, {blink:blinkOn, hurt:hurtTimer>0, jump:py<GROUND});
}

/* ─────────────────────────────────────────────
   TITLE RENDER (animates on title canvas bg)
───────────────────────────────────────────── */
function renderTitleBg(ts){
  ctx.clearRect(0,0,W,H);
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#c8e6ff'); grad.addColorStop(1,'#f0d0ff');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  bgClouds.forEach(c=>{
    c.x-=c.sp/60;
    if(c.x+c.w<0){c.x=W+20;c.y=60+Math.random()*200;}
    drawBgCloud(c.x,c.y,c.w,c.h,c.alpha);
  });
  // decorative stars
  for(let i=0;i<6;i++){
    const sx=55+i*58, sy=55+Math.sin(ts*.0015+i)*18;
    drawCollectStar({x:sx,y:sy,r:8+Math.sin(ts*.002+i)*2,angle:ts*.001+i});
  }
  // hero canvas float
  const hcvs=document.getElementById('hero-canvas');
  hcvs.style.transform=`translateY(${Math.sin(ts*.0024)*8}px)`;
  drawCinnaCanvas(hcvs,{blink:Math.sin(ts*.002)>.96});
}

/* ─────────────────────────────────────────────
   MAIN LOOP
───────────────────────────────────────────── */
function loop(ts=0){
  raf=requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,.05);
  lastT=ts;
  if(state==='playing'){ update(dt); render(); }
  else if(state==='title'){ renderTitleBg(ts); }
}

/* ─────────────────────────────────────────────
   STATE TRANSITIONS
───────────────────────────────────────────── */
function startGame(){
  document.getElementById('title-screen').style.display='none';
  document.getElementById('over-screen').style.display='none';
  state='playing'; initGame();
  if(raf) cancelAnimationFrame(raf);
  lastT=0; loop();
}

function gameOver(){
  state='gameover';
  if(score>best){ best=score; localStorage.setItem('cd_best',best); }
  document.getElementById('hud').style.display='none';
  document.getElementById('go-score').textContent=score;
  document.getElementById('go-best').textContent='🏆 최고 기록: '+best;
  drawCinnaCanvas(document.getElementById('over-canvas'),{blink:true});
  document.getElementById('over-screen').style.display='flex';
}

function showCombo(txt){
  const el=document.getElementById('combo');
  el.textContent='✨ '+txt;
  el.style.opacity='1';
}

/* ─────────────────────────────────────────────
   INPUT
───────────────────────────────────────────── */
function doJump(){
  if(state!=='playing') return;
  if(jumpsLeft>0){
    pvy=jumpsLeft===2?-700:-540;
    jumpsLeft--;
    spawnParticles(px+20,py,'#c8e8ff',7);
  }
}
document.getElementById('wrap').addEventListener('pointerdown',e=>{
  if(state==='playing'){ e.preventDefault(); doJump(); }
},{passive:false});
document.addEventListener('keydown',e=>{
  if((e.code==='Space'||e.code==='ArrowUp')&&state==='playing'){ e.preventDefault(); doJump(); }
});

/* ─────────────────────────────────────────────
   BOOT
───────────────────────────────────────────── */
resetBgClouds();
drawCinnaCanvas(document.getElementById('hero-canvas'));
loop();
</script>
