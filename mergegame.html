<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2의 배수 합치기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&display=swap');

:root {
–bg: #0a0a0f;
–panel: #111118;
–border: #1e1e2e;
–accent: #00ffcc;
–accent2: #ff00aa;
–accent3: #ffdd00;
–glow: rgba(0,255,204,0.15);
–text: #e0e0f0;
–grid-bg: #0d0d18;
–cell-empty: #151525;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Noto Sans KR’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: flex-start;
padding: 20px 10px;
overflow-x: hidden;
}

/* Animated background grid */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

.container {
position: relative;
z-index: 1;
width: 100%;
max-width: 480px;
}

/* Header */
header {
text-align: center;
margin-bottom: 18px;
}

.title {
font-family: ‘Orbitron’, monospace;
font-size: clamp(22px, 6vw, 38px);
font-weight: 900;
letter-spacing: 0.05em;
color: var(–accent);
text-shadow: 0 0 20px var(–accent), 0 0 60px rgba(0,255,204,0.3);
line-height: 1;
}

.title span {
color: var(–accent2);
text-shadow: 0 0 20px var(–accent2), 0 0 60px rgba(255,0,170,0.3);
}

.subtitle {
font-family: ‘Black Han Sans’, sans-serif;
font-size: 14px;
color: rgba(255,255,255,0.4);
margin-top: 4px;
letter-spacing: 0.2em;
}

/* Scores */
.scores {
display: flex;
gap: 12px;
justify-content: center;
margin-bottom: 14px;
}

.score-box {
background: var(–panel);
border: 1px solid var(–border);
border-radius: 10px;
padding: 8px 20px;
text-align: center;
position: relative;
overflow: hidden;
}

.score-box::after {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, var(–accent), transparent);
opacity: 0.5;
}

.score-box.best::after {
background: linear-gradient(90deg, transparent, var(–accent2), transparent);
}

.score-label {
font-size: 10px;
letter-spacing: 0.15em;
color: rgba(255,255,255,0.35);
text-transform: uppercase;
font-family: ‘Orbitron’, monospace;
}

.score-value {
font-family: ‘Orbitron’, monospace;
font-size: 22px;
font-weight: 700;
color: var(–accent);
line-height: 1.2;
}

.score-box.best .score-value {
color: var(–accent2);
}

/* Controls */
.controls {
display: flex;
gap: 10px;
justify-content: center;
margin-bottom: 16px;
}

.btn {
font-family: ‘Orbitron’, monospace;
font-size: 11px;
font-weight: 700;
letter-spacing: 0.12em;
padding: 9px 18px;
border: 1px solid var(–accent);
background: transparent;
color: var(–accent);
border-radius: 6px;
cursor: pointer;
transition: all 0.15s;
text-transform: uppercase;
}

.btn:hover {
background: var(–glow);
box-shadow: 0 0 16px rgba(0,255,204,0.3);
}

.btn:active { transform: scale(0.96); }

.btn-size {
border-color: var(–accent3);
color: var(–accent3);
}

.btn-size:hover {
background: rgba(255,221,0,0.1);
box-shadow: 0 0 16px rgba(255,221,0,0.3);
}

.btn-size.active {
background: rgba(255,221,0,0.15);
box-shadow: 0 0 20px rgba(255,221,0,0.4);
}

/* Grid */
.grid-wrapper {
background: var(–grid-bg);
border: 1px solid var(–border);
border-radius: 14px;
padding: 10px;
box-shadow: 0 0 40px rgba(0,255,204,0.05), inset 0 0 30px rgba(0,0,0,0.5);
position: relative;
}

#grid {
display: grid;
gap: 8px;
width: 100%;
aspect-ratio: 1;
}

/* Cells */
.cell {
border-radius: 8px;
background: var(–cell-empty);
display: flex;
align-items: center;
justify-content: center;
position: relative;
overflow: hidden;
transition: transform 0.08s;
}

.cell-inner {
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
border-radius: 8px;
font-family: ‘Orbitron’, monospace;
font-weight: 900;
transition: all 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
position: relative;
z-index: 1;
}

.cell-inner.pop {
animation: pop 0.2s cubic-bezier(0.34,1.8,0.64,1);
}

.cell-inner.new {
animation: appear 0.15s ease-out;
}

@keyframes pop {
0% { transform: scale(1); }
50% { transform: scale(1.22); }
100% { transform: scale(1); }
}

@keyframes appear {
0% { transform: scale(0.3); opacity: 0; }
100% { transform: scale(1); opacity: 1; }
}

/* Value-based colors */
.v2    { background: #1a2a2a; color: #00ffcc; border: 1px solid rgba(0,255,204,0.3); }
.v4    { background: #1a2235; color: #00ccff; border: 1px solid rgba(0,204,255,0.3); }
.v8    { background: #1f1a35; color: #aa88ff; border: 1px solid rgba(170,136,255,0.3); }
.v16   { background: #2a1a35; color: #dd66ff; border: 1px solid rgba(221,102,255,0.35); }
.v32   { background: #2d1525; color: #ff44cc; border: 1px solid rgba(255,68,204,0.35); }
.v64   { background: #2d1015; color: #ff3366; border: 1px solid rgba(255,51,102,0.4); box-shadow: 0 0 12px rgba(255,51,102,0.25); }
.v128  { background: #2d1a00; color: #ff9900; border: 1px solid rgba(255,153,0,0.4); box-shadow: 0 0 14px rgba(255,153,0,0.3); }
.v256  { background: #2d2200; color: #ffcc00; border: 1px solid rgba(255,204,0,0.4); box-shadow: 0 0 16px rgba(255,204,0,0.3); }
.v512  { background: #1a2d00; color: #88ff44; border: 1px solid rgba(136,255,68,0.4); box-shadow: 0 0 18px rgba(136,255,68,0.3); }
.v1024 { background: #002d1a; color: #00ffaa; border: 1px solid rgba(0,255,170,0.5); box-shadow: 0 0 22px rgba(0,255,170,0.4); }
.v2048 { background: linear-gradient(135deg, #1a0a00, #002020); color: #ffdd00;
border: 1px solid gold; box-shadow: 0 0 30px rgba(255,221,0,0.5), 0 0 60px rgba(255,221,0,0.2); }
.vmax  { background: linear-gradient(135deg, #1a001a, #001a2a); color: #fff;
border: 1px solid var(–accent2); box-shadow: 0 0 30px rgba(255,0,170,0.6); }

/* Glow pulse for high values */
.v1024 .cell-inner, .v2048 .cell-inner, .vmax .cell-inner {
animation: glow-pulse 2s infinite alternate;
}

@keyframes glow-pulse {
from { filter: brightness(1); }
to   { filter: brightness(1.3); }
}

/* Overlay screens */
.overlay {
position: absolute;
inset: 0;
border-radius: 14px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 16px;
z-index: 10;
backdrop-filter: blur(4px);
opacity: 0;
pointer-events: none;
transition: opacity 0.3s;
}

.overlay.show {
opacity: 1;
pointer-events: all;
}

.overlay-gameover { background: rgba(10,5,15,0.88); }
.overlay-win      { background: rgba(5,20,10,0.88); }

.overlay-title {
font-family: ‘Orbitron’, monospace;
font-size: clamp(24px, 8vw, 48px);
font-weight: 900;
letter-spacing: 0.05em;
}

.gameover-title { color: var(–accent2); text-shadow: 0 0 30px var(–accent2); }
.win-title      { color: var(–accent3); text-shadow: 0 0 30px var(–accent3); }

.overlay-msg {
font-size: 14px;
color: rgba(255,255,255,0.5);
letter-spacing: 0.1em;
}

/* Hint */
.hint {
text-align: center;
margin-top: 12px;
font-size: 11px;
color: rgba(255,255,255,0.2);
letter-spacing: 0.12em;
font-family: ‘Orbitron’, monospace;
}

/* Target display */
.target-bar {
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
margin-bottom: 12px;
font-family: ‘Orbitron’, monospace;
font-size: 12px;
color: rgba(255,255,255,0.3);
letter-spacing: 0.1em;
}

.target-val {
color: var(–accent3);
font-weight: 700;
font-size: 14px;
}

/* Combo flash */
.combo-flash {
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%,-50%);
font-family: ‘Orbitron’, monospace;
font-size: 48px;
font-weight: 900;
pointer-events: none;
z-index: 999;
opacity: 0;
}

@media (max-width: 400px) {
.scores { gap: 8px; }
.score-value { font-size: 18px; }
}
</style>

</head>
<body>
<div class="container">
  <header>
    <div class="title">2<span>×</span>N</div>
    <div class="subtitle">2의 배수 합치기</div>
  </header>

  <div class="scores">
    <div class="score-box">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-box best">
      <div class="score-label">Best</div>
      <div class="score-value" id="best">0</div>
    </div>
  </div>

  <div class="target-bar">
    목표: <span class="target-val" id="target-label">2048</span> 달성!
  </div>

  <div class="controls">
    <button class="btn" onclick="newGame()">↺ 새 게임</button>
    <button class="btn btn-size active" id="btn4" onclick="setSize(4)">4×4</button>
    <button class="btn btn-size" id="btn5" onclick="setSize(5)">5×5</button>
    <button class="btn btn-size" id="btn6" onclick="setSize(6)">6×6</button>
  </div>

  <div class="grid-wrapper">
    <div id="grid"></div>
    <div class="overlay overlay-gameover" id="overlay-gameover">
      <div class="overlay-title gameover-title">GAME OVER</div>
      <div class="overlay-msg">더 이상 움직일 수 없어요</div>
      <button class="btn" onclick="newGame()">다시 시작</button>
    </div>
    <div class="overlay overlay-win" id="overlay-win">
      <div class="overlay-title win-title">🎉 CLEAR!</div>
      <div class="overlay-msg" id="win-msg">2048 달성!</div>
      <button class="btn" onclick="continueGame()">계속하기</button>
      <button class="btn" onclick="newGame()">새 게임</button>
    </div>
  </div>

</div>

<div class="combo-flash" id="combo-flash"></div>

<script>
let SIZE = 4;
let board = [];
let score = 0;
let best = parseInt(localStorage.getItem('best2xn') || '0');
let won = false;
let keepPlaying = false;
let TARGET = 2048;

function setSize(s) {
  SIZE = s;
  TARGET = s === 4 ? 2048 : s === 5 ? 4096 : 8192;
  document.getElementById('target-label').textContent = TARGET;
  [4,5,6].forEach(n => {
    document.getElementById('btn'+n).classList.toggle('active', n === s);
  });
  newGame();
}

function newGame() {
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0;
  won = false;
  keepPlaying = false;
  document.getElementById('score').textContent = '0';
  document.getElementById('overlay-gameover').classList.remove('show');
  document.getElementById('overlay-win').classList.remove('show');
  addRandom();
  addRandom();
  render();
}

function addRandom() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!board[r][c]) empty.push([r,c]);
  if (!empty.length) return false;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random() < 0.85 ? 2 : 4;
  return true;
}

function getColorClass(v) {
  if (!v) return '';
  if (v === 2)    return 'v2';
  if (v === 4)    return 'v4';
  if (v === 8)    return 'v8';
  if (v === 16)   return 'v16';
  if (v === 32)   return 'v32';
  if (v === 64)   return 'v64';
  if (v === 128)  return 'v128';
  if (v === 256)  return 'v256';
  if (v === 512)  return 'v512';
  if (v === 1024) return 'v1024';
  if (v === 2048) return 'v2048';
  return 'vmax';
}

function getFontSize(v) {
  const s = v.toString().length;
  const base = Math.floor((document.getElementById('grid').offsetWidth - 8*(SIZE-1) - 20) / SIZE);
  if (s <= 3) return Math.floor(base * 0.38) + 'px';
  if (s <= 4) return Math.floor(base * 0.28) + 'px';
  if (s <= 5) return Math.floor(base * 0.22) + 'px';
  return Math.floor(base * 0.17) + 'px';
}

let newCells = new Set();
let mergedCells = new Set();

function render() {
  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;

  const cells = grid.querySelectorAll('.cell');
  if (cells.length !== SIZE*SIZE) {
    grid.innerHTML = '';
    for (let i = 0; i < SIZE*SIZE; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const inner = document.createElement('div');
      inner.className = 'cell-inner';
      cell.appendChild(inner);
      grid.appendChild(cell);
    }
  }

  const allCells = grid.querySelectorAll('.cell');
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const idx = r*SIZE+c;
      const v = board[r][c];
      const cell = allCells[idx];
      const inner = cell.querySelector('.cell-inner');
      const cls = getColorClass(v);

      // Remove old classes
      inner.className = 'cell-inner';
      if (cls) inner.classList.add(cls);

      if (v) {
        inner.textContent = v >= 1000 ? (v >= 1000000 ? (v/1000000).toFixed(1)+'M' : (v/1000).toFixed(v%1000===0?0:1)+'K') : v;
        inner.style.fontSize = getFontSize(v);
      } else {
        inner.textContent = '';
      }

      if (newCells.has(idx)) inner.classList.add('new');
      if (mergedCells.has(idx)) inner.classList.add('pop');
    }
  }

  newCells.clear();
  mergedCells.clear();
  document.getElementById('score').textContent = score;
  if (score > best) {
    best = score;
    localStorage.setItem('best2xn', best);
  }
  document.getElementById('best').textContent = best;
}

// Move logic
function slide(row) {
  // Remove zeros
  let arr = row.filter(x => x);
  let merged = new Array(arr.length).fill(false);
  let gained = 0;
  let mergeIdx = [];
  for (let i = 0; i < arr.length-1; i++) {
    if (!merged[i] && arr[i] === arr[i+1]) {
      arr[i] *= 2;
      gained += arr[i];
      arr.splice(i+1, 1);
      merged.splice(i+1, 1);
      merged[i] = true;
      mergeIdx.push(i);
    }
  }
  while (arr.length < SIZE) arr.push(0);
  return { arr, gained, mergeIdx };
}

function move(dir) {
  let moved = false;
  mergedCells.clear();
  let totalGained = 0;
  let maxMerge = 0;

  if (dir === 'left') {
    for (let r = 0; r < SIZE; r++) {
      const { arr, gained, mergeIdx } = slide(board[r]);
      if (arr.join() !== board[r].join()) moved = true;
      mergeIdx.forEach(c => mergedCells.add(r*SIZE+c));
      totalGained += gained;
      if (gained > maxMerge) maxMerge = gained;
      board[r] = arr;
    }
  } else if (dir === 'right') {
    for (let r = 0; r < SIZE; r++) {
      const rev = [...board[r]].reverse();
      const { arr, gained, mergeIdx } = slide(rev);
      const revBack = [...arr].reverse();
      if (revBack.join() !== board[r].join()) moved = true;
      mergeIdx.forEach(c => mergedCells.add(r*SIZE+(SIZE-1-c)));
      totalGained += gained;
      if (gained > maxMerge) maxMerge = gained;
      board[r] = revBack;
    }
  } else if (dir === 'up') {
    for (let c = 0; c < SIZE; c++) {
      const col = board.map(r => r[c]);
      const { arr, gained, mergeIdx } = slide(col);
      if (arr.join() !== col.join()) moved = true;
      mergeIdx.forEach(r => mergedCells.add(r*SIZE+c));
      totalGained += gained;
      if (gained > maxMerge) maxMerge = gained;
      arr.forEach((v,r) => board[r][c] = v);
    }
  } else if (dir === 'down') {
    for (let c = 0; c < SIZE; c++) {
      const col = board.map(r => r[c]).reverse();
      const { arr, gained, mergeIdx } = slide(col);
      const revBack = [...arr].reverse();
      if (revBack.join() !== board.map(r=>r[c]).join()) moved = true;
      mergeIdx.forEach(r => mergedCells.add((SIZE-1-r)*SIZE+c));
      totalGained += gained;
      if (gained > maxMerge) maxMerge = gained;
      revBack.forEach((v,r) => board[r][c] = v);
    }
  }

  if (moved) {
    score += totalGained;
    if (maxMerge >= 64) showCombo(maxMerge);
    const added = addRandom();
    // Track new cell
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (board[r][c] && !mergedCells.has(r*SIZE+c)) {
          // Will detect new vs moved by checking render state — skip for simplicity
        }
    findNewCells();
    render();
    checkWin();
    if (!canMove()) {
      setTimeout(() => document.getElementById('overlay-gameover').classList.add('show'), 400);
    }
  }
}

let prevBoard = [];

function findNewCells() {
  // Any cell that was 0 before and now has value
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!prevBoard[r]?.[c] && board[r][c])
        newCells.add(r*SIZE+c);
  prevBoard = board.map(r=>[...r]);
}

function showCombo(val) {
  const el = document.getElementById('combo-flash');
  const label = val >= 2048 ? '🔥 ' + val + '!' : val >= 512 ? '⚡ ' + val : '+' + val;
  el.textContent = label;
  el.style.color = val >= 2048 ? '#ffdd00' : val >= 512 ? '#ff3366' : '#00ffcc';
  el.style.textShadow = `0 0 30px currentColor`;
  el.style.opacity = '1';
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'comboAnim 0.8s ease-out forwards';
}

// Add combo animation
const style = document.createElement('style');
style.textContent = `
@keyframes comboAnim {
  0%   { opacity:1; transform: translate(-50%,-50%) scale(0.8); }
  30%  { opacity:1; transform: translate(-50%,-70%) scale(1.2); }
  100% { opacity:0; transform: translate(-50%,-100%) scale(1); }
}`;
document.head.appendChild(style);

function canMove() {
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (!board[r][c]) return true;
      if (c < SIZE-1 && board[r][c] === board[r][c+1]) return true;
      if (r < SIZE-1 && board[r][c] === board[r+1][c]) return true;
    }
  }
  return false;
}

function checkWin() {
  if (keepPlaying || won) return;
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (board[r][c] >= TARGET) {
        won = true;
        document.getElementById('win-msg').textContent = `${TARGET} 달성! 🎊`;
        setTimeout(() => document.getElementById('overlay-win').classList.add('show'), 300);
      }
}

function continueGame() {
  keepPlaying = true;
  document.getElementById('overlay-win').classList.remove('show');
}

// Keyboard
document.addEventListener('keydown', e => {
  const map = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// Touch swipe
let tx, ty;
document.getElementById('grid').addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, {passive:true});

document.getElementById('grid').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  const ab = [Math.abs(dx), Math.abs(dy)];
  if (Math.max(...ab) < 20) return;
  if (ab[0] > ab[1]) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
}, {passive:true});

// Init
prevBoard = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
newGame();
</script>

</body>
</html>
